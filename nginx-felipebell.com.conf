# port - production (custom domain)
# Static SPA build, served directly by nginx (no backend, no container).
# Managed in git; copy to:
#   /etc/nginx/sites-available/felipebell.com
# This is a NEW site file — do not overwrite the existing
# port.bell.vps-kinghost.net file (certbot already manages its SSL blocks).

server {
    listen 80;
    listen [::]:80;
    server_name felipebell.com www.felipebell.com;

    root /var/www/port/frontend/dist;
    index index.html;

    include snippets/acme-challenge.conf;
    include snippets/security-headers.conf;

    # Cache hashed static assets aggressively (Vite content-hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\.(?!well-known).* { deny all; }

    # Single-page app - all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/felipebell_access.log;
    error_log  /var/log/nginx/felipebell_error.log;
}

# After this is in place and DNS resolves, run:
#   sudo certbot --nginx -d felipebell.com -d www.felipebell.com
# Certbot adds the SSL blocks + HTTP->HTTPS redirect automatically.
#
# Then make the old subdomain redirect here permanently: edit
# /etc/nginx/sites-available/port.bell.vps-kinghost.net and replace the
# location / block's try_files line with:
#   return 301 https://felipebell.com$request_uri;
# (leave certbot's listen/ssl lines untouched so the old HTTPS URL still
# redirects cleanly), then: nginx -t && systemctl reload nginx
