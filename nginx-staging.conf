# port - staging
# Static SPA build, served directly by nginx (no backend, no container).
# Managed in git at scripts/../nginx-staging.conf; copy to:
#   /etc/nginx/sites-available/port-staging.bell.vps-kinghost.net

server {
    listen 80;
    server_name port-staging.bell.vps-kinghost.net;

    root /var/www/port-staging/frontend/dist;
    index index.html;

    include snippets/acme-challenge.conf;
    include snippets/security-headers.conf;

    # Cache hashed static assets aggressively (Vite content-hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\.(?!well-known).* { deny all; }

    # Single-page app - all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/port_staging_access.log;
    error_log  /var/log/nginx/port_staging_error.log;
}

# After this is in place, run:
#   sudo certbot --nginx -d port-staging.bell.vps-kinghost.net
# to provision HTTPS. Certbot will rewrite this file to add the SSL block
# and the HTTP->HTTPS redirect automatically (matches bpagenda's pattern).
